<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceGuard AI System</title>

<style>
body {
    background: linear-gradient(to bottom, #000428, #004e92);
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 40px;
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    margin: auto;
}

input {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    background: #00c6ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
}

.result {
    margin-top: 20px;
    font-size: 18px;
}
.alert {
    color: red;
    font-weight: bold;
}
.safe {
    color: lightgreen;
}
</style>
</head>

<body>

<h1>🚀 SpaceGuard AI Monitor</h1>

<div class="container">
    <h2>Asteroid Risk Analyzer</h2>

    <input type="number" id="distance" placeholder="Distance (km)">
    <input type="number" id="velocity" placeholder="Velocity (km/s)">
    <input type="number" id="mass" placeholder="Mass (tons)">

    <br>
    <button onclick="calculateRisk()">Analyze</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculateRisk() {

    let distance = parseFloat(document.getElementById("distance").value);
    let velocity = parseFloat(document.getElementById("velocity").value);
    let mass = parseFloat(document.getElementById("mass").value);

    if (!distance || !velocity || !mass) {
        document.getElementById("output").innerHTML = 
        "<span class='alert'>Please enter all values.</span>";
        return;
    }

    // Risk formula (MVP simulation)
    let riskScore = (velocity * mass) / distance;
    let riskPercent = Math.min(riskScore * 10, 100).toFixed(2);

    if (riskPercent > 70) {
        document.getElementById("output").innerHTML =
        "<span class='alert'>⚠ HIGH RISK: " + riskPercent + "%</span><br>" +
        "Rocket Safe Mode Activated 🚀";
    } else {
        document.getElementById("output").innerHTML =
        "<span class='safe'>Safe: " + riskPercent + "%</span><br>" +
        "System Monitoring...";
    }
}
</script>

</body>
</html>
